<div class="card shadow-sm">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div>
        <h5 class="card-title mb-0">Resumen</h5>
        <small class="text-muted">Presupuesto inicial y restante</small>
      </div>
      <div class="text-end">
        <div><small class="text-muted">Inicial</small></div>
        <div class="fw-bold">{{ initial | currency:'': 'symbol':'1.0-0' }}</div>
      </div>
    </div>

    <div class="mb-3">
      <div class="d-flex justify-content-between">
        <small class="text-muted">Restante</small>
        <small class="fw-bold">{{ remaining | currency:'': 'symbol':'1.0-0' }}</small>
      </div>
      <div class="progress mt-2" style="height:12px;">
        <div class="progress-bar {{ barraClase() }}" role="progressbar" [style.width.%]="porcentajeRestante()" 
             [attr.aria-valuenow]="porcentajeRestante()" aria-valuemin="0" aria-valuemax="100">
        </div>
      </div>
      <div class="mt-1"><small class="text-muted">{{ porcentajeRestante() }}% restante</small></div>
    </div>

    <h6>Gastos</h6>
    <ul class="list-group mb-2" *ngIf="gastos.length; else sinGastos">
      <li class="list-group-item d-flex justify-content-between align-items-center" *ngFor="let g of gastos">
        <div>
          <strong>{{ g.nombre }}</strong><br/><small class="text-muted">{{ g.cantidad | currency:'': 'symbol':'1.0-0' }}</small>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-outline-danger" (click)="eliminar(g.id)">Eliminar</button>
        </div>
      </li>
    </ul>
    <ng-template #sinGastos>
      <div class="text-center text-muted py-3">No hay gastos registrados</div>
    </ng-template>
  </div>
</div>
